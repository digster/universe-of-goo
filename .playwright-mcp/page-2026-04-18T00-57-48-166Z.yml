  - main [ref=e25]:
    - heading "01 · Particle & Verlet" [level=1] [ref=e26]
    - paragraph [ref=e27]: "Everything in this engine is built from one idea: a particle that remembers where it just was. That single fact is enough to integrate gravity, collide off walls, and — in later pages — hold an entire structure together."
    - heading "Why Verlet, not Euler?" [level=2] [ref=e28]
    - paragraph [ref=e29]:
      - text: Textbook explicit-Euler integration tracks
      - code [ref=e30]: position
      - text: and
      - code [ref=e31]: velocity
      - text: as two separate fields and steps them with
      - code [ref=e32]: v += a·dt; x += v·dt
      - text: . That works, but position-based constraint solvers (the whole engine from the next page onward) want to edit positions
      - emphasis [ref=e33]: directly
      - text: . If you move a particle inside the solver, a separately-stored velocity is now out of sync — you'd have to patch it back every time.
    - paragraph [ref=e34]:
      - strong [ref=e35]: Verlet integration
      - text: sidesteps that by not storing velocity at all. Each particle remembers its current position
      - code [ref=e36]: (x, y)
      - text: and its position from the
      - emphasis [ref=e37]: previous
      - text: step
      - code [ref=e38]: (oldX, oldY)
      - text: . The difference between the two
      - emphasis [ref=e39]: is
      - text: the velocity, implicitly. Move a particle's
      - code [ref=e40]: x
      - text: and its effective velocity changes automatically — exactly what the constraint solver needs.
    - heading "The integration step" [level=2] [ref=e41]
    - paragraph [ref=e42]:
      - text: One step of Verlet on a particle looks like this (
      - link "src/physics/integrator.js" [ref=e43] [cursor=pointer]:
        - /url: ../../src/physics/integrator.js
        - code [ref=e44]: src/physics/integrator.js
      - text: "):"
    - generic [ref=e45]: temp = (x, y) (x, y) = (x, y) + (x - oldX, y - oldY) · (1 - damping) + a · dt² (oldX, oldY) = temp
    - paragraph [ref=e46]:
      - text: "Reading right-to-left: the new position is the old position plus the implicit velocity (scaled down by damping) plus the acceleration term. Then we shuffle the old position forward so next step's"
      - code [ref=e47]: (x - oldX)
      - text: gives us the updated velocity.
    - blockquote [ref=e48]:
      - strong [ref=e49]: Pinned particles
      - text: set
      - code [ref=e50]: invMass = 0
      - text: . The integrator skips them and the constraint solver divides their correction by zero weight, so they never move — no branching needed downstream.
